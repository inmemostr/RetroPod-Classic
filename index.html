<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RetroPod Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Apple-like font usually Chicago or Podium, using Inter for clean modern equivalent fallback -->
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f0f0f0;
        overflow: hidden; /* Prevent body scroll on mobile when using wheel */
        touch-action: none;
      }
      /* Custom Scrollbar for the "LCD" look */
      .lcd-scrollbar::-webkit-scrollbar {
        width: 0px;
      }
      /* Photo viewer fade-in animation */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-in;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
